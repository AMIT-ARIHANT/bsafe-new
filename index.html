<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B'Safe HealthCare</title>
  <meta name="description" content="B'Safe HealthCare – Be Safe, Your Safety First." />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #e8e4f6 0%, #f3f1fb 50%, #ede8f8 100%);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(59,47,143,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
    }

    .logo-wrap {
      margin-bottom: 32px;
      animation: rise 0.9s cubic-bezier(.22,.68,0,1.2) both;
    }
    .logo-wrap img {
      height: 120px;
      width: auto;
      display: block;
      filter: drop-shadow(0 6px 24px rgba(59,47,143,0.18));
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3.2vw, 1.75rem);
      font-weight: 500;
      color: #3B2F8F;
      letter-spacing: 0.06em;
      margin-bottom: 52px;
      animation: rise 0.9s 0.14s cubic-bezier(.22,.68,0,1.2) both;
    }

    .divider {
      width: 56px; height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, #3B2F8F, #CC2200);
      margin: 0 auto 48px;
      animation: grow 1s 0.26s ease both;
    }

    .coming {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 9vw, 5.6rem);
      font-weight: 700;
      line-height: 1.08;
      color: #2A1F6E;
      letter-spacing: -0.02em;
      margin-bottom: 90px;
      animation: rise 0.9s 0.30s cubic-bezier(.22,.68,0,1.2) both;
    }
    .coming em {
      font-style: italic;
      color: #CC2200;
    }

    .copy {
      font-size: 0.74rem;
      font-weight: 300;
      color: rgba(59,47,143,0.38);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      animation: rise 0.9s 0.44s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes grow {
      from { opacity: 0; width: 0; }
      to   { opacity: 1; width: 56px; }
    }

    @media (max-width: 480px) {
      .logo-wrap img { height: 80px; }
    }
  </style>
</head>
